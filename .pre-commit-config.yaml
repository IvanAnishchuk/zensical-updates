# pre-commit hooks for zensical-updates
# https://pre-commit.com
#
# Install:
#     uv run pre-commit install --install-hooks
#     uv run pre-commit install --hook-type commit-msg
#     uv run pre-commit install --hook-type pre-push
#
# Run manually on all files:
#     uv run pre-commit run --all-files

default_language_version:
  python: python3

default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

default_stages: [pre-commit]

fail_fast: false

repos:
  # ── File hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-ast
        types: [python]
      - id: debug-statements
        types: [python]
      - id: check-docstring-first
        types: [python]

  # ── uv lockfile sync ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.21
    hooks:
      - id: uv-lock

  # ── Ruff + ty via uv ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (security + style, auto-fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (type check)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: ty-check
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: basedpyright
        name: basedpyright (type check)
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # ── GitHub Actions security audit (zizmor, offline) ──────────
  - repo: local
    hooks:
      - id: zizmor
        name: zizmor (GitHub Actions audit)
        entry: uv run zizmor --offline .github/workflows/
        language: system
        files: ^\.github/(workflows/.*|zizmor\.yml)$
        pass_filenames: false
        require_serial: true

  # ── Secret scanning ──────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ── Conventional Commits ─────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - feat
          - fix
          - chore
          - security
          - perf
          - docs
          - test
          - refactor
          - ci
          - build
          - revert
          - style

  # ── Pre-push: test + audit ───────────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest (full suite)
        entry: uv run pytest tests/ -q --no-cov
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: audit
        name: supply-chain audit (pip-audit + SBOM)
        entry: uv run python scripts/audit.py
        language: system
        pass_filenames: false
        stages: [pre-push]
