name: Test report

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions: {}

# Must match the primary Python version in test.yml matrix
env:
  PRIMARY_PYTHON: "3.11"

jobs:
  report:
    name: Publish test results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'cancelled'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results-${{ env.PRIMARY_PYTHON }}
          path: .reports/test/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish test results (PR annotations)
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: .reports/test/test-results.xml
          check_name: "Pytest report (${{ env.PRIMARY_PYTHON }})"
          comment_mode: always
          compare_to_earlier_commit: true
          event_file: ${{ github.event_path }}
          event_name: ${{ github.event.workflow_run.event }}
          commit: ${{ github.event.workflow_run.head_sha }}
