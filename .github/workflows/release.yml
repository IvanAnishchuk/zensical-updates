name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  # -------------------------------------------------------------------
  # Decide where (if anywhere) to publish from the event and tag, using
  # ANCHORED version matching so incidental letters in a tag or branch
  # name (e.g. "main" contains "a") can never misroute the release.
  # -------------------------------------------------------------------
  classify:
    name: Classify release target
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      target: ${{ steps.c.outputs.target }}
      prerelease: ${{ steps.c.outputs.prerelease }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Determine publish target
        id: c
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          TESTPYPI: ${{ inputs.testpypi }}
        run: |
          target=none
          prerelease=false
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$TESTPYPI" = "true" ]; then target=testpypi; prerelease=true; fi
          elif [ "$EVENT" = "push" ]; then
            ver="${REF_NAME#v}"
            if printf '%s' "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              target=pypi
            elif printf '%s' "$ver" | grep -qiE '^[0-9]+\.[0-9]+\.[0-9]+(\.?(a|b|c|rc|alpha|beta|dev)[0-9]*)+$'; then
              target=testpypi
              prerelease=true
            fi
          fi
          {
            echo "target=$target"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "event=$EVENT ref=$REF_NAME -> target=$target prerelease=$prerelease"

  # -------------------------------------------------------------------
  # Build wheel + sdist with reproducible settings, generate SBOM,
  # attest provenance, and sign with sigstore.
  # -------------------------------------------------------------------
  build:
    name: Build & attest
    needs: classify
    if: needs.classify.outputs.target != 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false  # reproducible release build; avoid cache poisoning

      - name: Compute SOURCE_DATE_EPOCH from tag commit
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "${GITHUB_SHA}")" >> "$GITHUB_ENV"
          echo "PYTHONHASHSEED=0" >> "$GITHUB_ENV"

      - name: Build sdist and wheel
        run: |
          uv build
          ls -la dist/

      - name: Generate SBOM (CycloneDX)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run python scripts/regen_requirements.py --stdout > requirements-release.txt
          uv tool run --from cyclonedx-bom cyclonedx-py requirements requirements-release.txt \
            --output-format json \
            --output-file "dist/${GITHUB_REPOSITORY##*/}-${VERSION}-sbom.cdx.json"
          ls -la dist/

      - name: Compute artifact hashes
        id: hash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          HASHES=$(sha256sum *.whl *.tar.gz | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"
          sha256sum *.whl *.tar.gz > "${GITHUB_REPOSITORY##*/}-${VERSION}-SHA256SUMS.txt"

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/*.whl,dist/*.tar.gz"

      - name: Attest SBOM
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "sbom_path=dist/${GITHUB_REPOSITORY##*/}-${VERSION}-sbom.cdx.json" >> "$GITHUB_ENV"

      - name: Attest SBOM (upload)
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/*.whl"
          sbom-path: "${{ env.sbom_path }}"

      - name: Sign artifacts with sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: ./dist/*.whl ./dist/*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: |
            dist/
            requirements-release.txt
          retention-days: 7

  # -------------------------------------------------------------------
  # SLSA Level 3 provenance generator (reusable workflow).
  # Pinned by tag, NOT SHA. The generator's generate-builder.sh
  # requires refs/tags/vX.Y.Z to fetch its pre-built binary -- commit
  # SHAs cause "Invalid ref" (exit 2). This is an accepted exception
  # to the SHA-pinning policy: tags can be retargeted upstream, but
  # the reusable workflow runs in an isolated environment the caller
  # cannot tamper with, and SLSA provenance is independently verifiable.
  # Requires contents: write even with upload-assets: false due to
  # static permission validation (slsa-github-generator#2044).
  # -------------------------------------------------------------------
  provenance:
    name: SLSA L3 provenance
    needs: build
    permissions:
      contents: write    # upload-assets job inside reusable workflow requires write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: false
      provenance-name: ${{ github.event.repository.name }}-${{ github.ref_name }}-provenance.intoto.jsonl

  # -------------------------------------------------------------------
  # Publish to PyPI via trusted publishing (OIDC, no password).
  # Only stable releases (no dev/a/b/c pre-release segments).
  # Protected by the `pypi` environment which requires manual approval.
  # -------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: [classify, build]
    if: needs.classify.outputs.target == 'pypi'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/${{ github.event.repository.name }}/
    permissions:
      id-token: write      # OIDC for trusted publishing
      attestations: write  # PEP 740 publish attestations
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp release-dist/dist/*.whl release-dist/dist/*.tar.gz dist/
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
          verbose: true

  # -------------------------------------------------------------------
  # Publish to TestPyPI for pre-releases or manual dispatch.
  # -------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [classify, build]
    if: needs.classify.outputs.target == 'testpypi'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: testpypi
      url: https://test.pypi.org/project/${{ github.event.repository.name }}/
    permissions:
      id-token: write      # OIDC for trusted publishing
      attestations: write  # PEP 740 publish attestations
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp release-dist/dist/*.whl release-dist/dist/*.tar.gz dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

  # -------------------------------------------------------------------
  # Create GitHub Release with all artifacts (wheel, sdist, SBOM,
  # sigstore bundles, SLSA provenance).
  # -------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [classify, build, provenance, publish-pypi, publish-testpypi]
    if: >-
      always()
      && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      && needs.classify.outputs.target != 'none'
      && needs.build.result == 'success'
      && needs.provenance.result == 'success'
      && (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
      && (needs.publish-testpypi.result == 'success' || needs.publish-testpypi.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Download SLSA provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-provenance.intoto.jsonl
          path: release-dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              /^## \[/ { if (p) exit; if ($0 ~ "\\[" ver "\\]") p=1; next }
              p && /^\[[^][]+\]:[[:space:]]/ { exit }
              p { print }
            ' CHANGELOG.md > release-notes.md
          else
            : > release-notes.md
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create draft release with assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "${{ github.event.repository.name }} ${{ steps.notes.outputs.version }}"
          body_path: release-notes.md
          draft: true
          prerelease: ${{ needs.classify.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-dist/dist/*.whl
            release-dist/dist/*.tar.gz
            release-dist/dist/*-sbom.cdx.json
            release-dist/dist/*-SHA256SUMS.txt
            release-dist/dist/*.sigstore.json
            release-dist/*-provenance.intoto.jsonl

      - name: Publish release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
