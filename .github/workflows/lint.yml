name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: .reports

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write  # upload SARIF to code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/lint"

      - name: Ruff check (full suite, SARIF)
        run: |
          set +e
          uv run ruff check --output-format=sarif \
            --output-file="${REPORTS_DIR}/lint/ruff.sarif" src/ tests/
          echo "ruff_exit=$?" >> "$GITHUB_ENV"
          uv run ruff check --output-format=github src/ tests/ \
            | tee "${REPORTS_DIR}/lint/ruff.log" || true
        continue-on-error: true

      - name: Ruff check (JSON report)
        run: |
          uv run ruff check --output-format=json \
            --output-file="${REPORTS_DIR}/lint/ruff.json" src/ tests/ || true

      - name: Ruff format check
        run: |
          set +e
          uv run ruff format --check --diff src/ tests/ \
            | tee "${REPORTS_DIR}/lint/ruff-format.log"
          echo "format_exit=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Lint report"
            echo ""
            if [ ! -f "${REPORTS_DIR}/lint/ruff.json" ]; then
              echo "**ruff**: scanner did not produce output -- check logs"
            elif [ -s "${REPORTS_DIR}/lint/ruff.json" ]; then
              count=$(jq length "${REPORTS_DIR}/lint/ruff.json")
              echo "**ruff** found **$count** issue(s)"
            else
              echo "**ruff**: clean"
            fi
            echo ""
            echo "<details><summary>Ruff output</summary>"
            echo ""
            echo '```'
            head -100 "${REPORTS_DIR}/lint/ruff.log" 2>/dev/null || echo "no output"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Ruff SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: .reports/lint/ruff.sarif
          category: ruff

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-logs
          path: .reports/lint/
          retention-days: 14

      - name: Fail if ruff found issues
        run: |
          if [ "${ruff_exit:-0}" != "0" ]; then
            echo "Ruff check reported issues -- see logs above."
            exit 1
          fi
          if [ "${format_exit:-0}" != "0" ]; then
            echo "Ruff format check failed -- see diff above."
            exit 1
          fi
