name: Coverage comment

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions: {}

# Must match the primary Python version in test.yml matrix
env:
  PRIMARY_PYTHON: "3.11"

concurrency:
  group: coverage-comment-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage comment + badge
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_repository.full_name == github.repository
    timeout-minutes: 5
    permissions:
      actions: read          # download artifacts from the triggering run
      contents: write        # push badge to data branch
      pull-requests: write   # post PR comment
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # No actions/checkout needed -- the coverage action uses
      # GITHUB_TOKEN directly for all git operations. See:
      # https://github.com/py-cov-action/python-coverage-comment-action#workflow_run

      - name: Download test artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results-${{ env.PRIMARY_PYTHON }}
          path: .reports/test/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore .coverage to workspace root
        run: cp .reports/test/.coverage .coverage 2>/dev/null || true

      - name: Coverage comment + badge
        uses: py-cov-action/python-coverage-comment-action@63f52f4fbbffada6e8dee8ec432de7e01df9ba79 # v3.41
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_RUN_ID: ${{ github.event.workflow_run.id }}
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 75
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: warning
          COMMENT_TEMPLATE: |
            {% extends "base" %}
            {% block coverage_badges %}
            {{ super() }}
            {% if coverage.meta.branch_coverage and coverage.info.num_branches > 0 %}

            | Metric | Covered | Total | Percentage |
            |--------|---------|-------|------------|
            | Statements | {{ coverage.info.covered_lines }} | {{ coverage.info.num_statements }} | {{ "%.1f" | format(coverage.info.covered_lines / coverage.info.num_statements * 100) }}% |
            | Branches | {{ coverage.info.covered_branches }} | {{ coverage.info.num_branches }} | {{ "%.1f" | format(coverage.info.covered_branches / coverage.info.num_branches * 100) }}% |

            <sub>{{ coverage.info.missing_lines }} statements missing, {{ coverage.info.missing_branches }} branches missing, {{ coverage.info.num_partial_branches }} partially covered</sub>
            {% endif %}
            {% endblock coverage_badges %}
