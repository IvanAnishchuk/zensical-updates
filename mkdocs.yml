site_name: zensical-updates
site_description: Generate a dated Updates (blog) section for zensical sites as plain Markdown
site_author: Ivan Anishchuk
site_url: https://IvanAnishchuk.github.io/zensical-updates/
copyright: © Ivan Anishchuk
repo_url: https://github.com/IvanAnishchuk/zensical-updates
repo_name: IvanAnishchuk/zensical-updates
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  # API reference: autodoc from Google-style docstrings.
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  # `--8<-- "CHANGELOG.md"` pulls the root changelog into docs/changelog.md.
  - pymdownx.snippets:
      base_path: ["."]
  # CLI reference: autodoc the typer maintenance CLI (`::: mkdocs-typer2`).
  - mkdocs_typer2.markdown:
      pretty: true
      engine: native
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference: api.md
  - CLI: cli.md
  - Changelog: changelog.md
