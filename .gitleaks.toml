# Gitleaks configuration.
#
# Extends the upstream default ruleset (all built-in secret rules stay on).
# When you need to allowlist a fabricated / test-vector secret that lives in
# this repo, add a path-scoped allowlist with a real `paths` entry, e.g.:
#
#   [allowlist]
#   description = "Fixture secrets"
#   paths = ['''tests/fixtures/example_secret\.txt''']
#
# Keep allowlists path-scoped; never broad regex allowlists, which would
# silently disable real detections everywhere. An allowlist with no checks (an
# empty `paths`) is rejected by newer gitleaks, so do not add an empty one.
[extend]
useDefault = true
